[pytest]
# Minimum pytest version required
minversion = 6.0

# Directory where tests are located
testpaths = tests

# Pattern for test files
python_files = test_*.py

# Default command line options
# -v: Verbose output
# --tb=short: Cleaner, shorter tracebacks on failure
# --strict-markers: Ensure you don't use undefined markers
addopts = -v --tb=short --strict-markers

# Define custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that require data or external files

# Filter out common library warnings (like those from pandas or altair)
# to keep your test terminal output clean
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning